<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}i-emhana.kz | Админ панель{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg-a: #ffffff;
        --bg-b: #dff8e8;
        --bg-c: #b8efca;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-border: rgba(28, 142, 71, 0.25);
        --text-main: #111111;
        --green-main: #1f9d55;
      }

      body {
        min-height: 100vh;
        color: var(--text-main);
        background: radial-gradient(circle at 8% 12%, #ffffff 0%, transparent 28%),
          radial-gradient(circle at 92% 8%, #c9f5d9 0%, transparent 25%),
          linear-gradient(135deg, var(--bg-a), var(--bg-b) 45%, var(--bg-c));
      }

      .blob {
        position: fixed;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        filter: blur(48px);
        opacity: 0.35;
        z-index: 0;
        pointer-events: none;
      }

      .blob.one {
        background: #88ecab;
        top: -80px;
        left: -60px;
      }

      .blob.two {
        background: #a4f0bf;
        bottom: -120px;
        right: -60px;
      }

      .navbar {
        backdrop-filter: blur(12px);
        background: linear-gradient(90deg, #ffffff, #e5f9ec, #cbf3d8) !important;
        border-bottom: 1px solid var(--panel-border);
        z-index: 10;
      }

      .navbar .navbar-brand,
      .navbar .nav-link {
        color: var(--text-main) !important;
      }

      .navbar .nav-link:hover {
        color: #0a7a3a !important;
      }

      main.container {
        position: relative;
        z-index: 2;
      }

      .card {
        background: var(--panel);
        backdrop-filter: blur(10px);
        border: 1px solid var(--panel-border) !important;
        color: var(--text-main);
      }

      .card-header {
        background: rgba(230, 249, 237, 0.92) !important;
        border-bottom: 1px solid var(--panel-border) !important;
      }

      .table {
        color: var(--text-main);
      }

      .table-light, .table-light th {
        background-color: rgba(215, 245, 225, 0.9) !important;
        color: var(--text-main) !important;
      }

      .text-muted {
        color: #2c2c2c !important;
      }

      .btn-warning {
        background: linear-gradient(90deg, #27b362, #1f9d55) !important;
        border-color: #1b8b4a !important;
        color: #ffffff !important;
        box-shadow: 0 8px 18px rgba(31, 157, 85, 0.25);
      }

      .btn-outline-light {
        color: #1f9d55 !important;
        border-color: #1f9d55 !important;
      }

      .btn-outline-light:hover {
        background: #1f9d55 !important;
        color: #ffffff !important;
      }

      .btn-outline-secondary {
        color: #1f9d55 !important;
        border-color: #8ed8ab !important;
      }

      .btn-outline-primary {
        color: #0f7b3d !important;
        border-color: #0f7b3d !important;
      }

      .btn-danger {
        background-color: #111111 !important;
        border-color: #111111 !important;
      }
    </style>
  </head>
  <body>
    <div class="blob one"></div>
    <div class="blob two"></div>
    <nav class="navbar navbar-expand-lg navbar-light bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'clinic:dashboard' %}">
          <i class="fa-solid fa-staff-snake me-2"></i>i-emhana.kz
        </a>

        {% if user.is_authenticated %}
          <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'clinic:dashboard' %}">
                  <i class="fa-solid fa-chart-line me-1"></i>Дашборд
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'clinic:appointment_list' %}">
                  <i class="fa-solid fa-calendar-check me-1"></i>Записи
                </a>
              </li>
            </ul>
            <div class="d-flex gap-2">
              <a class="btn btn-outline-light btn-sm" href="/admin/" target="_blank" rel="noopener">
                <i class="fa-solid fa-gear me-1"></i>Админка
              </a>
              <a class="btn btn-warning btn-sm" href="{% url 'clinic:appointment_create' %}">
                <i class="fa-solid fa-plus me-1"></i>Новый прием
              </a>
              <a href="{% url 'clinic:logout' %}" class="btn btn-danger btn-sm">
                <i class="fa-solid fa-right-from-bracket me-1"></i>Выход
              </a>
            </div>
          </div>
        {% else %}
          <div class="d-flex">
            <a class="btn btn-warning btn-sm" href="{% url 'clinic:login' %}">Войти</a>
          </div>
        {% endif %}
      </div>
    </nav>

    <main class="container mt-4">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
